<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Set New Password | MyApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-400 via-pink-400 to-red-400 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-xl rounded-3xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Set New Password</h2>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="password" class="block text-gray-700 font-medium mb-1">New Password</label>
        <input type="password" name="password" id="password" placeholder="Enter new password"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md">
      </div>

      <div>
        <label for="confirm" class="block text-gray-700 font-medium mb-1">Confirm Password</label>
        <input type="password" name="confirm" id="confirm" placeholder="Confirm new password"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md">
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">
        Update Password
      </button>

      {% if error %}
      <div class="mt-3">
        <p class="text-red-500 text-sm font-medium">{{ error }}</p>
      </div>
      {% endif %}
    </form>

    <div class="mt-6 text-center">
      <a href="{% url 'login' %}" class="text-purple-500 font-medium hover:text-purple-700">&larr; Back to Login</a>
    </div>

  </div>

</body>

</html>
