<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Notes | Home</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen">

  <div class="container mx-auto px-4 py-8">
    <h1 class="text-3xl font-bold text-center text-gray-800 mb-8">Welcome to the Note App</h1>

    <!-- Add Note Button -->
    <div class="flex justify-end mb-6">
      <a href="{% url 'create_note' %}"
        class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded-lg transition duration-300 shadow-md">+ Add New Note</a>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
      {% for note in notes %}
      <div class="bg-white shadow-lg rounded-xl p-5 hover:shadow-2xl transition duration-300">
        <h2 class="text-xl font-semibold text-gray-800 mb-3">{{ note.title }}</h2>
        <div class="flex justify-between mt-4">
          <a href="{% url 'note_detail' note.id %}"
            class="text-blue-500 hover:text-blue-700 font-medium">View</a>
          <a href="{% url 'update_note' note.id %}"
            class="text-yellow-500 hover:text-yellow-700 font-medium">Edit</a>
          <a href="{% url 'delete_note' note.id %}"
            class="text-red-500 hover:text-red-700 font-medium">Delete</a>
        </div>
      </div>
      {% empty %}
      <p class="col-span-full text-center text-gray-500">No notes yet. Create your first note!</p>
      {% endfor %}
    </div>
  </div>

</body>

</html>
