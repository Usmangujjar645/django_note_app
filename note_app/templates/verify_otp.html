<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP | MyApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-400 via-pink-400 to-red-400 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-xl rounded-3xl p-8 w-full max-w-md">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Verify OTP</h2>

    <p class="text-gray-600 text-center mb-6">Enter the OTP sent to your email to continue.</p>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="otp" class="block text-gray-700 font-medium mb-1">OTP</label>
        <input type="text" name="otp" id="otp" placeholder="Enter OTP"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md text-center tracking-widest text-lg">
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">
        Verify OTP
      </button>

      {% if error %}
      <div class="mt-3">
        <p class="text-red-500 text-sm font-medium text-center">{{ error }}</p>
      </div>
      {% endif %}

    </form>

    <div class="mt-6 text-center">
      <a href="{% url 'forgot_password' %}" class="text-purple-500 font-medium hover:text-purple-700">&larr; Resend OTP</a>
    </div>

  </div>

</body>

</html>
