<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Note | MyApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-xl rounded-3xl p-8 w-full max-w-lg">

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Create a New Note</h2>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="title" class="block text-gray-700 font-medium mb-1">Title</label>
        <input type="text" name="title" id="title" placeholder="Enter note title"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md">
      </div>

      <div>
        <label for="content" class="block text-gray-700 font-medium mb-1">Content</label>
        <textarea name="content" id="content" rows="6" placeholder="Write your note here..."
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md resize-none"></textarea>
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">Save Note</button>

      {% if messages %}
      <div class="mt-3">
        {% for message in messages %}
        <p class="text-red-500 text-sm font-medium">{{ message }}</p>
        {% endfor %}
      </div>
      {% endif %}

    </form>

    <div class="mt-6 text-center">
      <a href="{% url 'home' %}" class="text-purple-500 font-medium hover:text-purple-700">&larr; Back to Notes</a>
    </div>

  </div>

</body>

</html>
