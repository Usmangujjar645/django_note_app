<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Note Details | MyApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="bg-white shadow-xl rounded-3xl p-8 w-full max-w-lg">

    <h1 class="text-2xl font-bold text-gray-800 mb-4">{{ notes.title }}</h1>

    <p class="text-gray-700 mb-4 whitespace-pre-line">{{ notes.content }}</p>

    <p class="text-gray-400 text-sm mb-6">Created on: {{ notes.created_at }}</p>

    <div class="flex justify-between">
      <a href="{% url 'update_note' notes.id %}"
        class="bg-yellow-500 hover:bg-yellow-600 text-white font-bold py-2 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">
        Edit
      </a>
      <a href="{% url 'delete_note' notes.id %}"
        class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">
        Delete
      </a>
      <a href="{% url 'home' %}"
        class="bg-purple-500 hover:bg-purple-600 text-white font-bold py-2 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">
        Back
      </a>
    </div>

  </div>

</body>

</html>
