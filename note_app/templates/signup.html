<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | MyApp</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-r from-purple-400 via-pink-400 to-red-400 min-h-screen flex items-center justify-center">

  <div class="bg-white shadow-xl rounded-3xl p-8 w-full max-w-md relative">

    <!-- Logo/Icon -->
    <div class="flex justify-center mb-6">
      <div class="bg-purple-500 text-white rounded-full w-16 h-16 flex items-center justify-center text-3xl font-bold shadow-lg">
        M
      </div>
    </div>

    <h2 class="text-2xl font-bold mb-6 text-center text-gray-800">Create Your Account</h2>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label for="username" class="block text-gray-700 font-medium mb-1">Username</label>
        <input type="text" name="username" id="username" placeholder="Enter your username"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md">
      </div>

      <div>
        <label for="email" class="block text-gray-700 font-medium mb-1">Email</label>
        <input type="email" name="email" id="email" placeholder="Enter your email"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md">
      </div>

      <div>
        <label for="password1" class="block text-gray-700 font-medium mb-1">Password</label>
        <input type="password" name="password1" id="password1" placeholder="Enter your password"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md">
      </div>

      <div>
        <label for="password2" class="block text-gray-700 font-medium mb-1">Confirm Password</label>
        <input type="password" name="password2" id="password2" placeholder="Confirm your password"
          class="w-full px-4 py-2 border rounded-xl focus:ring-2 focus:ring-purple-400 focus:outline-none transition-shadow duration-200 hover:shadow-md">
      </div>

      <button type="submit"
        class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 text-white font-bold py-3 px-4 rounded-xl transition duration-300 shadow-md hover:shadow-lg">Sign Up</button>

      {% if messages %}
      <div class="mt-3">
        {% for message in messages %}
        <p class="text-red-500 text-sm font-medium">{{ message }}</p> <!-- error messages -->
        {% endfor %}
      </div>
      {% endif %}

    </form>

    <p class="text-center text-gray-500 text-sm mt-6">Already have an account? 
      <a href="{% url 'login' %}" class="text-purple-500 font-medium hover:text-purple-700">Login</a>
    </p>

  </div>

</body>

</html>
